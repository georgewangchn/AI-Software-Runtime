id: llm_corpus
kind: domain
version: "2.0.0"
requires_commons:
  - base
agents:
  - id: requirement_agent
    depends_on: []
    step: 1
  - id: compliance_agent
    depends_on: [requirement_agent]
    step: 2
  - id: feature_agent
    depends_on: [compliance_agent]
    step: 3
  - id: software_arch_agent
    depends_on: [feature_agent]
    step: 4
  - id: hardware_agent
    depends_on: [software_arch_agent]
    step: 5
  - id: lifecycle_agent
    depends_on: [hardware_agent]
    step: 6
  - id: budget_agent
    depends_on: [lifecycle_agent]
    step: 7
rules:
  feature_rules: rules/feature_rules.yaml
  hardware_rules: rules/hardware_rules.yaml
  budget_rules: rules/budget_rules.yaml
  compliance_rules: rules/compliance_rules.yaml
intent_keywords:
  requirement: ["语料", "规模", "语种", "标注", "等保", "AI", "大模型", "训练", "推理"]
  feature: ["功能", "增加", "删除", "标注引擎", "智能标注", "价值对齐", "RLHF", "安全合规"]