- id: mandatory_features
  name: 必需功能
  condition: "true"
  features:
    - "数据预处理"
    - "模型训练"
    - "评估指标"
    - "API服务"

- id: advanced_features
  name: 高级功能
  condition: "语料总规模TB > 1000"
  features:
    - "智能标注"
    - "自动调参"
    - "分布式训练"

- id: compliance_features
  name: 合规功能
  condition: "是否需要安全合规 == true"
  features:
    - "访问控制"
    - "审计日志"
    - "数据脱敏"