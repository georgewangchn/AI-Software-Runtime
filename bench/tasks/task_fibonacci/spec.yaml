acceptance:
- description: Identical arguments passed in recursive nested calls must return cached
    result
  expected_behavior: Second and subsequent identical recursive calls return cached
    value without re-execution
  name: cache_hit_across_recursive_calls
- description: Cache must retain values between separate top-level function calls
  expected_behavior: First call with args [1,2] caches result; second call with same
    args returns cached value immediately
  name: cache_persists_between_top_level_calls
- description: Cache must not grow unbounded
  expected_behavior: Cache has maximum size limit (e.g., LRU eviction) to prevent
    memory exhaustion
  name: cache_size_limited
constraints:
- description: Cache must be shared across all recursive invocations of the function
  name: cache_must_be_shared
  type: must
- description: Must not use global variables or module-level state for cache
  name: no_global_state
  type: must_not
- description: Cache access must be thread-safe if used in concurrent environments
  name: thread_safe
  type: should
- description: Memoization must not alter function's external behavior or side effects
  name: no_side_effects
  type: must
features:
- acceptance_tests: []
  description: Exposes hit/miss metrics for debugging and performance monitoring
  name: cache_statistics
goal: Fix memoization bug where cache is local and never persists across recursive
  calls
metadata: {}
