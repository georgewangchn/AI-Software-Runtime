acceptance:
- description: Input count < 0 must be rejected with appropriate error
  expected_behavior: System returns error or throws exception for negative count
  name: negative_count_rejection
- description: Input count = 0 must be accepted and processed normally
  expected_behavior: System processes zero count without error and returns valid output
  name: zero_count_acceptance
- description: Output must use consistent key name for count value
  expected_behavior: Output object contains key "count" with the validated value
  name: output_key_standardization
constraints:
- description: Must reject any negative count values
  name: reject_negative_count
  type: must
- description: Must accept zero as a valid count value
  name: accept_zero_count
  type: must
- description: Must set the output key to a standardized name (e.g., "count")
  name: set_output_key
  type: must
features:
- acceptance_tests: []
  description: Ensures output key is consistently named "count"
  name: standardized_output
goal: Fix negative count rejection, accept zero, and set output key
metadata: {}
