goal: "REST API for user management"
constraints:
  - name: fastapi
    description: "Must use FastAPI framework"
    type: must
  - name: python312
    description: "Python 3.12+"
    type: must
acceptance:
  - name: all_tests_pass
    description: "All 5 tests in test_main.py must pass"
    expected_behavior: "pytest exits with code 0"
features:
  - name: get_user
    description: "Retrieve user by ID, return complete user object including name, email, and id"
  - name: search_users
    description: "Search users by name prefix, handle empty query gracefully without crashing"
  - name: create_user
    description: "Create user with duplicate email detection, return 409 for duplicates"
